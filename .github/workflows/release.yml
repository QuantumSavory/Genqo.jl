name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  register:
    name: Register with Julia General Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Extract text between the first two ## headings (skipping [Unreleased])
          notes=$(sed -n '/^## \[[0-9]/,/^## \[/{/^## \[[0-9]/!{/^## \[/!p}}' CHANGELOG.md)
          {
            echo "body<<EOF"
            echo "@JuliaRegistrator register"
            echo ""
            echo "Release notes:"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment @JuliaRegistrator register
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments"
          -f body="${{ steps.notes.outputs.body }}"
