name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  register:
    name: Register with Julia General Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Comment @JuliaRegistrator register
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments"
          -f body="@JuliaRegistrator register"
